# Reusable workflow: build + push a single OpenProctor image to GHCR.
# Mirrors tao-ce/.github/workflows/build-image.yml (multi-arch, cached).
name: build-openproctor-image

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string

env:
  IMAGE_URL: ghcr.io/${{ github.repository }}/${{ inputs.image }}

jobs:
  build:
    runs-on: ${{ fromJSON('{"amd64":"ubuntu-24.04","arm64":"ubuntu-24.04-arm"}')[matrix.arch] }}
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_URL }}
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=registry,ref=${{ env.IMAGE_URL }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,mode=max,ref=${{ env.IMAGE_URL }}:buildcache-${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          labels: ${{ steps.meta.outputs.labels }}

  manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_URL }}
          tags: |
            type=sha,format=long
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push manifest
        run: |
          for t in ${{ join(fromJSON(steps.meta.outputs.json).tags, ' ') }}; do
            docker buildx imagetools create -t $t \
              ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          done
